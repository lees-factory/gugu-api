<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이메일 인증</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f5f5; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif; color:#111827;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f5f5f5; margin:0; padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:560px; background-color:#ffffff; border:1px solid #e5e7eb; border-radius:16px; overflow:hidden;">
                <tr>
                    <td style="padding:32px 32px 16px 32px; text-align:center;">
                        <div style="display:inline-block; padding:10px 14px; background-color:#111827; color:#ffffff; border-radius:12px; font-size:18px; font-weight:700; letter-spacing:-0.02em;">
                            Gugu Plus
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 8px 32px;">
                        <h1 style="margin:0; font-size:28px; line-height:1.3; font-weight:800; color:#111827; letter-spacing:-0.03em;">
                            이메일 인증 코드 안내
                        </h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 24px 32px;">
                        <p style="margin:0; font-size:16px; line-height:1.7; color:#4b5563;">
                            Gugu Plus 계정 인증을 위해 아래 인증 코드를 입력해주세요.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 24px 32px;">
                        <div style="background-color:#f9fafb; border:1px solid #e5e7eb; border-radius:14px; padding:20px; text-align:center;">
                            <p style="margin:0 0 8px 0; font-size:13px; color:#6b7280; line-height:1.5;">
                                인증 코드
                            </p>
                            <p style="margin:0; font-size:36px; line-height:1.2; font-weight:800; letter-spacing:0.18em; color:#111827;">
                                {{ .VerificationCode }}
                            </p>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 8px 32px;">
                        <p style="margin:0; font-size:14px; line-height:1.7; color:#4b5563;">
                            이 코드는 <strong style="color:#111827;">10분 동안 유효</strong>합니다.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 32px 32px 32px;">
                        <p style="margin:0; font-size:14px; line-height:1.7; color:#6b7280;">
                            본인이 요청하지 않았다면 이 메일을 무시해주세요.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 32px; background-color:#f9fafb; border-top:1px solid #e5e7eb;">
                        <p style="margin:0; font-size:12px; line-height:1.7; color:#9ca3af; text-align:center;">
                            © Gugu Plus. 가격 기록을 더 쉽게.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
