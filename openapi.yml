openapi: 3.0.3
info:
  title: gugu-api
  version: 1.0.0
  description: gugu API의 상태 확인 및 인증 관련 엔드포인트 명세
servers:
  - url: http://localhost:8080
tags:
  - name: 상태 확인
    description: 서버 상태 확인 API
  - name: 인증
    description: 회원가입, 이메일 인증, 로그인 API
  - name: 외부 연동
    description: 외부 서비스 연결 및 상태 조회 API
paths:
  /health:
    get:
      tags:
        - 상태 확인
      summary: 서버 상태 확인
      description: 서버가 정상적으로 요청을 처리할 수 있는지 확인한다.
      operationId: healthCheck
      responses:
        '200':
          description: 서버가 정상 상태다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                success:
                  value:
                    result: SUCCESS
                    data:
                      status: ok
  /v1/auth/register/email:
    post:
      tags:
        - 인증
      summary: 이메일 회원가입
      description: 이메일과 비밀번호로 계정을 만들고 6자리 인증 코드를 발송한다.
      operationId: registerEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEmailRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: secret123!
                  display_name: Gugu User
      responses:
        '201':
          description: 회원가입이 완료되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEmailResponse'
        '400':
          description: 요청 형식이 잘못되었거나 비즈니스 규칙을 위반했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                duplicateEmail:
                  value:
                    result: ERROR
                    error:
                      code: B1000
                      message: email already exists
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/login/email:
    post:
      tags:
        - 인증
      summary: 이메일 로그인
      description: 이메일과 비밀번호가 맞으면 JWT access token과 refresh token을 발급한다.
      operationId: loginEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEmailRequest'
      responses:
        '200':
          description: 로그인에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 요청 형식이 잘못되었거나 이메일 인증이 완료되지 않았다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                emailNotVerified:
                  value:
                    result: ERROR
                    error:
                      code: B2001
                      message: email is not verified
        '401':
          description: 로그인 정보가 유효하지 않다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    result: ERROR
                    error:
                      code: B2000
                      message: invalid credentials
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/verify-email:
    post:
      tags:
        - 인증
      summary: 이메일 인증 코드 검증
      description: 회원가입 시 받은 6자리 인증 코드를 검증한다.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
            examples:
              default:
                value:
                  code: '123456'
      responses:
        '200':
          description: 이메일 인증이 완료되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          description: 요청 형식이 잘못되었거나 인증 코드를 찾을 수 없다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                codeNotFound:
                  value:
                    result: ERROR
                    error:
                      code: B2002
                      message: verification code not found
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/oauth/login:
    post:
      tags:
        - 인증
      summary: OAuth 로그인
      description: OAuth 공급자 정보로 로그인하거나 신규 사용자를 생성한 뒤 JWT 토큰을 발급한다.
      operationId: loginOAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginOAuthRequest'
      responses:
        '200':
          description: OAuth 로그인에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 요청 형식이 잘못되었거나 지원하지 않는 공급자다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidBody:
                  value:
                    result: ERROR
                    error:
                      code: E400
                      message: invalid request body
                invalidProvider:
                  value:
                    result: ERROR
                    error:
                      code: B2003
                      message: oauth provider is invalid
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/authorize-url:
    post:
      tags:
        - 외부 연동
      summary: AliExpress 인가 URL 생성
      description: 사용자를 AliExpress seller authorization 화면으로 보내기 위한 URL을 생성한다.
      operationId: buildAliExpressAuthorizationURL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AliExpressAuthorizationURLRequest'
      responses:
        '200':
          description: 인가 URL 생성에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressAuthorizationURLResponse'
        '400':
          description: 요청 형식이 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/exchange-code:
    post:
      tags:
        - 외부 연동
      summary: AliExpress 인가 code 교환
      description: callback 으로 받은 code를 AliExpress token으로 교환하고 내부 연결 상태를 저장한다.
      operationId: exchangeAliExpressCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AliExpressExchangeCodeRequest'
      responses:
        '200':
          description: code 교환 및 연결 저장에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressConnectionStatusResponse'
        '400':
          description: code가 유효하지 않거나 요청 형식이 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/integrations/aliexpress/connection-status:
    get:
      tags:
        - 외부 연동
      summary: AliExpress 연결 상태 조회
      description: 내부에 저장된 AliExpress seller 연결 상태를 조회한다. token 원문은 반환하지 않는다.
      operationId: getAliExpressConnectionStatus
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
          description: 연결 상태를 확인할 내부 사용자 ID
      responses:
        '200':
          description: 연결 상태 조회에 성공했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AliExpressConnectionStatusResponse'
        '400':
          description: 요청 형식이 잘못되었다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 서버 내부 오류가 발생했다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ResultType:
      type: string
      description: API 처리 결과 구분값
      enum:
        - SUCCESS
        - ERROR
    ErrorMessage:
      type: object
      description: 에러 응답 본문
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 애플리케이션 에러 코드
          example: E400
        message:
          type: string
          description: 사용자 또는 클라이언트가 확인할 에러 메시지
          example: invalid request body
        data:
          nullable: true
          description: 추가 에러 데이터
    ErrorResponse:
      type: object
      description: 공통 에러 응답 래퍼
      required:
        - result
        - error
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        error:
          $ref: '#/components/schemas/ErrorMessage'
    User:
      type: object
      description: 사용자 정보
      required:
        - id
        - email
        - display_name
        - email_verified
        - created_at
      properties:
        id:
          type: string
          description: 사용자 고유 ID
          example: user_01
        email:
          type: string
          format: email
          description: 사용자 이메일
          example: user@example.com
        display_name:
          type: string
          description: 화면 표시 이름
          example: Gugu User
        email_verified:
          type: boolean
          description: 이메일 인증 완료 여부
          example: false
        created_at:
          type: string
          format: date-time
          description: 계정 생성 시각
          example: '2026-03-14T12:00:00Z'
    Tokens:
      type: object
      description: 로그인 성공 시 발급되는 JWT 토큰 묶음
      required:
        - access_token
        - refresh_token
        - token_type
        - access_expires_at
        - refresh_expires_at
      properties:
        access_token:
          type: string
          description: API 인증에 사용하는 JWT access token
        refresh_token:
          type: string
          description: access token 재발급에 사용할 JWT refresh token
        token_type:
          type: string
          description: Authorization 헤더에 사용할 토큰 타입
          example: Bearer
        access_expires_at:
          type: string
          format: date-time
          description: access token 만료 시각
          example: '2026-03-14T12:15:00Z'
        refresh_expires_at:
          type: string
          format: date-time
          description: refresh token 만료 시각
          example: '2026-03-28T12:00:00Z'
    RegisterEmailRequest:
      type: object
      description: 이메일 회원가입 요청
      required:
        - email
        - password
        - display_name
      properties:
        email:
          type: string
          format: email
          description: 회원가입 이메일
        password:
          type: string
          format: password
          description: 로그인 비밀번호
        display_name:
          type: string
          description: 사용자 표시 이름
    LoginEmailRequest:
      type: object
      description: 이메일 로그인 요청
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: 로그인 이메일
        password:
          type: string
          format: password
          description: 로그인 비밀번호
    VerifyEmailRequest:
      type: object
      description: 이메일 인증 코드 검증 요청
      required:
        - code
      properties:
        code:
          type: string
          description: 이메일로 전달된 6자리 인증 코드
          example: '123456'
    LoginOAuthRequest:
      type: object
      description: OAuth 로그인 요청
      required:
        - provider
        - subject
        - email
        - display_name
      properties:
        provider:
          type: string
          description: OAuth 공급자 이름
          example: google
        subject:
          type: string
          description: 공급자가 내려준 사용자 식별자
          example: oauth-subject-123
        email:
          type: string
          format: email
          description: 공급자 기준 이메일
        display_name:
          type: string
          description: 공급자 기준 표시 이름
    AliExpressAuthorizationURLRequest:
      type: object
      description: AliExpress 인가 URL 생성 요청
      required:
        - user_id
      properties:
        user_id:
          type: string
          description: 내부 사용자 ID
          example: user_01
    AliExpressExchangeCodeRequest:
      type: object
      description: AliExpress callback code 교환 요청
      required:
        - user_id
        - code
      properties:
        user_id:
          type: string
          description: 내부 사용자 ID
          example: user_01
        code:
          type: string
          description: AliExpress callback 으로 받은 authorization code
          example: ali-code-123
    HealthData:
      type: object
      description: 상태 확인 응답 데이터
      required:
        - status
      properties:
        status:
          type: string
          description: 서버 상태값
          example: ok
    HealthResponse:
      type: object
      description: 상태 확인 성공 응답
      required:
        - result
        - data
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        data:
          $ref: '#/components/schemas/HealthData'
    RegisterEmailData:
      type: object
      description: 이메일 회원가입 성공 데이터
      required:
        - user
        - verification_dispatched
      properties:
        user:
          $ref: '#/components/schemas/User'
        verification_code:
          type: string
          nullable: true
          description: 현재 구현에서 개발 및 확인 용도로 함께 반환하는 6자리 인증 코드
          example: '123456'
        verification_dispatched:
          type: boolean
          description: 인증 코드 발송 처리 여부
          example: true
    RegisterEmailResponse:
      type: object
      description: 이메일 회원가입 성공 응답
      required:
        - result
        - data
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        data:
          $ref: '#/components/schemas/RegisterEmailData'
    LoginData:
      type: object
      description: 로그인 성공 데이터
      required:
        - user
        - tokens
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/Tokens'
    LoginResponse:
      type: object
      description: 로그인 성공 응답
      required:
        - result
        - data
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        data:
          $ref: '#/components/schemas/LoginData'
    VerifyEmailData:
      type: object
      description: 이메일 인증 성공 데이터
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/User'
    VerifyEmailResponse:
      type: object
      description: 이메일 인증 성공 응답
      required:
        - result
        - data
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        data:
          $ref: '#/components/schemas/VerifyEmailData'
    AliExpressAuthorizationURLData:
      type: object
      description: AliExpress 인가 URL 응답 데이터
      required:
        - user_id
        - authorization_url
      properties:
        user_id:
          type: string
          description: 내부 사용자 ID
          example: user_01
        authorization_url:
          type: string
          description: AliExpress seller authorization 페이지 URL
          example: https://api-sg.aliexpress.com/oauth/authorize?response_type=code
    AliExpressAuthorizationURLResponse:
      type: object
      description: AliExpress 인가 URL 생성 응답
      required:
        - result
        - data
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        data:
          $ref: '#/components/schemas/AliExpressAuthorizationURLData'
    AliExpressConnectionStatusData:
      type: object
      description: AliExpress 연결 상태 응답 데이터
      required:
        - user_id
        - connected
        - reauthorization_required
      properties:
        user_id:
          type: string
          description: 내부 사용자 ID
          example: user_01
        seller_id:
          type: string
          nullable: true
          description: 연결된 AliExpress seller 식별자
          example: '200042362'
        account:
          type: string
          nullable: true
          description: 연결된 AliExpress 계정명
          example: seller@example.com
        user_nick:
          type: string
          nullable: true
          description: 연결된 AliExpress seller 닉네임
          example: seller nick
        connected:
          type: boolean
          description: 현재 연결 정보가 존재하는지 여부
          example: true
        reauthorization_required:
          type: boolean
          description: refresh token 만료 등으로 재인가가 필요한지 여부
          example: false
        authorized_at:
          type: string
          format: date-time
          nullable: true
          description: 최초 인가 완료 시각
        access_token_expires_at:
          type: string
          format: date-time
          nullable: true
          description: 내부 access token 만료 시각
        refresh_token_expires_at:
          type: string
          format: date-time
          nullable: true
          description: 내부 refresh token 만료 시각
        last_refreshed_at:
          type: string
          format: date-time
          nullable: true
          description: 토큰을 마지막으로 저장 또는 갱신한 시각
    AliExpressConnectionStatusResponse:
      type: object
      description: AliExpress 연결 상태 응답
      required:
        - result
        - data
      properties:
        result:
          $ref: '#/components/schemas/ResultType'
        data:
          $ref: '#/components/schemas/AliExpressConnectionStatusData'
